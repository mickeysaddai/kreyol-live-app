<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Kreyòl → English — Live Captions</title>
<style>
  :root{
    --ink:#12151A;
    --panel:#1B1F27;
    --panel-2:#20242D;
    --paper:#F5F3EE;
    --muted:#8890A0;
    --signal:#E8A33D;
    --alert:#E2574C;
    --ok:#5FB489;
    --line:#2A2F3A;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0; height:100%;
    background:var(--ink); color:var(--paper);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-tap-highlight-color:transparent;
    overscroll-behavior:none;
  }
  .mono{ font-family:"SF Mono",SFMono-Regular,Consolas,"Liberation Mono",Menlo,monospace; }
  #app{
    display:flex; flex-direction:column; height:100%;
    max-width:720px; margin:0 auto;
    padding:env(safe-area-inset-top) 16px env(safe-area-inset-bottom) 16px;
  }
  header{
    padding:16px 4px 12px 4px;
    display:flex; align-items:center; justify-content:space-between;
    border-bottom:1px solid var(--line);
  }
  .brand{ display:flex; flex-direction:column; gap:2px; }
  .brand .title{ font-size:15px; font-weight:600; letter-spacing:0.02em; }
  .brand .sub{ font-size:11px; color:var(--muted); letter-spacing:0.08em; text-transform:uppercase; }
  .status{ display:flex; align-items:center; gap:8px; font-size:11px; color:var(--muted); letter-spacing:0.05em; }
  .dot{ width:8px;height:8px;border-radius:50%; background:var(--muted); flex-shrink:0; }
  .dot.live{
    background:var(--signal);
    animation:pulse 1.6s infinite;
  }
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(232,163,61,0.55);}
    70%{box-shadow:0 0 0 10px rgba(232,163,61,0);}
    100%{box-shadow:0 0 0 0 rgba(232,163,61,0);}
  }
  #controls{
    display:flex; gap:10px; padding:14px 4px; align-items:center;
    border-bottom:1px solid var(--line);
  }
  button#toggle{
    background:var(--signal); color:#1A1206; border:none; border-radius:8px;
    padding:12px 20px; font-size:14px; font-weight:700; letter-spacing:0.02em; cursor:pointer;
  }
  button#toggle.stop{ background:var(--alert); color:#2A0E0B; }
  button#toggle:active{ transform:scale(0.98); }
  #chunkInfo{ font-size:11px; color:var(--muted); }

  #stage{
    flex:1; overflow-y:auto; padding:20px 4px 12px 4px;
    display:flex; flex-direction:column; gap:18px;
  }
  .caption{ animation:fadein 0.35s ease-out; }
  @keyframes fadein{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);} }
  .caption .meta{ display:flex; gap:10px; align-items:baseline; margin-bottom:6px; }
  .caption .time{ font-size:11px; color:var(--signal); letter-spacing:0.05em; }
  .caption .tag{ font-size:11px; color:var(--muted); letter-spacing:0.05em; }
  .caption .en{ font-size:22px; line-height:1.35; font-weight:600; color:var(--paper); }
  .caption .en.pending{ color:var(--muted); font-weight:500; font-style:italic; }
  .caption .en.failed{ color:var(--alert); font-weight:500; font-size:15px; }
  .caption .ht{ margin-top:6px; font-size:13px; color:var(--muted); font-style:italic; line-height:1.4; }

  #empty{ margin:auto; text-align:center; color:var(--muted); padding:0 20px; }
  #empty .big{ font-size:16px; color:var(--paper); margin-bottom:8px; font-weight:600; }
  #empty .small{ font-size:13px; line-height:1.5; }

  #banner{
    display:none; background:var(--panel-2); border:1px solid var(--alert); color:var(--paper);
    font-size:13px; padding:10px 12px; border-radius:8px; margin:10px 4px 0 4px; line-height:1.4;
  }
</style>
</head>
<body>
<div id="app">

  <header>
    <div class="brand">
      <div class="title">Kreyòl → English</div>
      <div class="sub">Live Captions</div>
    </div>
    <div class="status">
      <span class="dot" id="statusDot"></span>
      <span id="statusText" class="mono">idle</span>
    </div>
  </header>

  <div id="controls">
    <button id="toggle">Start Listening</button>
    <span id="chunkInfo" class="mono">~10s chunks</span>
  </div>

  <div id="banner"></div>

  <div id="stage">
    <div id="empty">
      <div class="big">Ready when you are</div>
      <div class="small">
        Tap <strong>Start Listening</strong> and hold your phone toward the speaker.
        Each ~10 second chunk gets transcribed and translated, and appears here as it's ready.
      </div>
    </div>
  </div>

</div>

<script>
(function(){
  const toggleBtn = document.getElementById('toggle');
  const stage = document.getElementById('stage');
  const emptyState = document.getElementById('empty');
  const statusDot = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');
  const banner = document.getElementById('banner');

  const CHUNK_MS = 10000;
  const OVERLAP_MS = 400; // next recorder starts this long before the current one stops, so no audio is ever missed

  let mediaStream = null;
  let currentRecorder = null;
  let chunkTimer = null;
  let listening = false;

  function showBanner(msg){ banner.textContent = msg; banner.style.display = 'block'; }
  function hideBanner(){ banner.style.display = 'none'; }

  function setStatus(state){
    statusDot.classList.toggle('live', state === 'live');
    statusText.textContent = state === 'live' ? 'listening' : 'idle';
  }

  function fmtTime(){
    return new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'});
  }

  function sleep(ms){ return new Promise(r => setTimeout(r, ms)); }

  function blobToBase64(blob){
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onloadend = () => resolve(reader.result.split(',')[1]);
      reader.onerror = reject;
      reader.readAsDataURL(blob);
    });
  }

  function addPendingCaption(){
    if(emptyState && emptyState.parentNode) emptyState.remove();
    const wrap = document.createElement('div');
    wrap.className = 'caption';
    wrap.innerHTML = `
      <div class="meta">
        <span class="time mono">${fmtTime()}</span>
        <span class="tag mono">translating…</span>
      </div>
      <div class="en pending">…</div>
      <div class="ht"></div>
    `;
    stage.appendChild(wrap);
    stage.scrollTop = stage.scrollHeight;
    return wrap;
  }

  function fillCaption(el, english, creole){
    el.querySelector('.tag').textContent = 'EN';
    const enEl = el.querySelector('.en');
    enEl.textContent = english;
    enEl.classList.remove('pending');
    el.querySelector('.ht').textContent = creole;
    stage.scrollTop = stage.scrollHeight;
  }

  function failCaption(el, message){
    el.querySelector('.tag').textContent = 'error';
    const enEl = el.querySelector('.en');
    enEl.textContent = message;
    enEl.classList.remove('pending');
    enEl.classList.add('failed');
  }

  function removeCaption(el){
    el.remove();
  }

  function pickMimeType(){
    const candidates = ['audio/webm;codecs=opus', 'audio/webm', 'audio/mp4', 'audio/aac'];
    for(const c of candidates){
      if(window.MediaRecorder && MediaRecorder.isTypeSupported(c)) return c;
    }
    return '';
  }

  async function processChunk(blob){
    if(blob.size < 2000) return; // skip near-silent chunks
    const captionEl = addPendingCaption();
    try{
      const base64 = await blobToBase64(blob);

      const res = await fetch('/.netlify/functions/translate-chunk', {
        method: 'POST',
        headers: {'content-type': 'application/json'},
        body: JSON.stringify({ audio: base64, mime: blob.type })
      });
      const data = await res.json();
      if(!res.ok) throw new Error(data.error || 'Request failed');

      if(!data.english || data.english === '[inaudible]'){
        removeCaption(captionEl);
        return;
      }

      fillCaption(captionEl, data.english, data.creole || '');
      hideBanner();
    }catch(err){
      failCaption(captionEl, err.message);
      showBanner('A chunk failed: ' + err.message + '. Still listening — later chunks may still work.');
    }
  }

  function startOneRecorder(){
    const mimeType = pickMimeType();
    let rec;
    try{
      rec = mimeType ? new MediaRecorder(mediaStream, { mimeType }) : new MediaRecorder(mediaStream);
    }catch(e){
      showBanner('Could not start the recorder: ' + e.message);
      stopListening();
      return null;
    }
    const chunks = [];
    rec.ondataavailable = (e) => { if(e.data && e.data.size > 0) chunks.push(e.data); };
    rec.onstop = () => {
      const blob = new Blob(chunks, { type: rec.mimeType || 'audio/webm' });
      processChunk(blob); // fire and forget, pipelines independently of the recording loop
    };
    rec.start();
    return rec;
  }

  // Two recorders take turns on the SAME live mic stream, with a short overlap
  // between them, so there is never a moment where nothing is being captured.
  function recordingLoop(){
    if(!listening) return;
    const intervalMs = CHUNK_MS - OVERLAP_MS;

    chunkTimer = setTimeout(() => {
      if(!listening) return;
      const previous = currentRecorder;
      currentRecorder = startOneRecorder();
      // Stop the previous recorder shortly after the next one has already started.
      setTimeout(() => {
        if(previous && previous.state !== 'inactive') previous.stop();
      }, OVERLAP_MS);
      recordingLoop();
    }, intervalMs);
  }

  function recordNextChunk(){
    if(!listening) return;
    currentRecorder = startOneRecorder();
    if(!currentRecorder) return;
    recordingLoop();
  }

  async function startListening(){
    hideBanner();
    if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
      showBanner('This browser doesn\'t support microphone access. Try Chrome or Safari.');
      return;
    }
    try{
      mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    }catch(e){
      showBanner('Microphone access was blocked or unavailable: ' + e.message);
      return;
    }
    listening = true;
    setStatus('live');
    toggleBtn.textContent = 'Stop Listening';
    toggleBtn.classList.add('stop');
    recordNextChunk();
  }

  function stopListening(){
    listening = false;
    if(chunkTimer) clearTimeout(chunkTimer);
    if(currentRecorder && currentRecorder.state !== 'inactive'){
      try{ currentRecorder.stop(); }catch(e){}
    }
    if(mediaStream){
      mediaStream.getTracks().forEach(t => t.stop());
      mediaStream = null;
    }
    setStatus('idle');
    toggleBtn.textContent = 'Start Listening';
    toggleBtn.classList.remove('stop');
  }

  toggleBtn.addEventListener('click', () => {
    if(listening){ stopListening(); } else { startListening(); }
  });
})();
</script>
</body>
</html>
